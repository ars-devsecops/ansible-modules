# =============================================================================
# inventory/hosts.ini
# Master : Ansible control node (this server — runs playbook)
# Slave  : 172.31.21.0 — private subnet, slave-user already created
# =============================================================================

[slave]
172.31.21.0 ansible_user=slave-user ansible_ssh_private_key_file=/home/ec2-user/master-server-kp.pem

[slave:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
ansible_python_interpreter=/usr/bin/python3
