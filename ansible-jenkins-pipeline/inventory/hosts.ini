# =============================================================================
# Ansible Inventory — ars-devsecops
# Target: Application Server 172.24.5.128
# Jfrog:  172.24.20.44
# =============================================================================

[app_servers]
fic-app-server ansible_host=172.24.5.128 ansible_user=ec2-user ansible_ssh_private_key_file=/var/lib/jenkins/.ssh/id_rsa

[jfrog_servers]
jfrog-server ansible_host=172.24.20.44 ansible_user=ec2-user ansible_ssh_private_key_file=/var/lib/jenkins/.ssh/id_rsa

[app_servers:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
ansible_python_interpreter=/usr/bin/python3

[all:vars]
jfrog_url=https://artifactory.godrejhf.com/artifactory
jfrog_repo=Core-unicom/UNI-FIC-BE-UAT
